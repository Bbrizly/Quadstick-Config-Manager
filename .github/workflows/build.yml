name: CI

on:
  push:
    branches: [main]
    tags: ["v*"]
  pull_request:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: write

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "8.0.x"
      - run: dotnet test QuadStick.sln --nologo

  package:
    name: Package ${{ matrix.rid }}
    needs: test
    if: startsWith(github.ref, 'refs/tags/v')
    strategy:
      matrix:
        include:
          - rid: win-x64
            os: windows-latest
          - rid: osx-arm64
            os: macos-latest
          - rid: osx-x64
            os: macos-latest
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "8.0.x"
      - run: >
          dotnet publish src/QuadStick.App/QuadStick.App.csproj
          -c Release -r ${{ matrix.rid }}
          --self-contained true
          -p:PublishSingleFile=true
          -o publish/${{ matrix.rid }}
      - uses: actions/upload-artifact@v4
        with:
          name: QuadStickConfigManager-${{ matrix.rid }}
          path: publish/${{ matrix.rid }}

  release:
    name: Release
    needs: package
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts
      - run: |
          cd artifacts
          for d in */; do (cd "$d" && zip -r "../${d%/}.zip" .); done
      - uses: softprops/action-gh-release@v2
        with:
          files: artifacts/*.zip
