name: CI

# Tests run on every push and PR. Pushing a version tag (vX.Y.Z) additionally
# builds a download for each platform and publishes a GitHub Release — the tag
# is the only thing you create; everything below is automatic.
on:
  push:
    branches: [main]
    tags: ["v*"]
  pull_request:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

# Least privilege by default; only the release job can write to the repo.
permissions:
  contents: read

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "8.0.x"
      - run: dotnet test QuadStick.sln --nologo

  # One self-contained download per platform, built only for v* tags.
  # Windows/Linux ship one compressed single-file binary; macOS ships a proper
  # .app bundle via scripts/make-macos-app.sh (the same script `make package`
  # uses, so local and release builds are identical).
  package:
    name: Package ${{ matrix.label }}
    needs: test
    if: startsWith(github.ref, 'refs/tags/v')
    timeout-minutes: 25
    strategy:
      fail-fast: false
      matrix:
        include:
          - { os: windows-latest, rid: win-x64,   label: Windows-x64,        kind: windows }
          - { os: macos-latest,   rid: osx-arm64, label: macOS-AppleSilicon, kind: macos   }
          - { os: macos-latest,   rid: osx-x64,   label: macOS-Intel,        kind: macos   }
          - { os: ubuntu-latest,  rid: linux-x64, label: Linux-x64,          kind: linux   }
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "8.0.x"

      - name: Version from tag
        shell: bash
        run: echo "VERSION=${GITHUB_REF_NAME#v}" >> "$GITHUB_ENV"   # v1.2.3 -> 1.2.3

      # The real Google OAuth client is gitignored (GoogleClient.Local.cs),
      # so CI recreates it from repo secrets. Failing here is deliberate: a
      # release built without it would ship with Google backup silently
      # disabled. Forks without the feature can delete this step.
      - name: Google client from secrets
        shell: bash
        env:
          GID: ${{ secrets.GOOGLE_CLIENT_ID }}
          GSECRET: ${{ secrets.GOOGLE_CLIENT_SECRET }}
        run: |
          if [ -z "$GID" ] || [ -z "$GSECRET" ]; then
            echo "GOOGLE_CLIENT_ID / GOOGLE_CLIENT_SECRET repo secrets are not set." >&2
            echo "Add them in Settings > Secrets and variables > Actions, or remove this step to release without Google backup." >&2
            exit 1
          fi
          # The values become C# string literals; only allow characters
          # Google actually uses so a stray quote or newline cannot break
          # or leak. A case glob checks every character, unlike grep,
          # which works line by line and would let a newline through.
          case "$GID$GSECRET" in (*[!A-Za-z0-9._-]*)
            echo "A Google client secret value has unexpected characters; refusing to write source." >&2
            exit 1
          esac
          cat > src/QuadStick.App/GoogleClient.Local.cs <<EOF
          namespace QuadStick.App;

          static class GoogleClient
          {
              public const string Id = "$GID";
              public const string Secret = "$GSECRET";
          }
          EOF

      - name: Publish
        shell: bash
        run: |
          # macOS puts the plain self-contained folder inside the .app; the
          # other platforms collapse to one compressed single file.
          EXTRA=""
          [ "${{ matrix.kind }}" = "macos" ] || \
            EXTRA="-p:PublishSingleFile=true -p:EnableCompressionInSingleFile=true"
          dotnet publish src/QuadStick.App/QuadStick.App.csproj \
            -c Release -r ${{ matrix.rid }} --self-contained true \
            -p:Version="$VERSION" $EXTRA -o publish --nologo

      - name: Package (Windows)
        if: matrix.kind == 'windows'
        shell: pwsh
        run: |
          Remove-Item publish/*.pdb -ErrorAction SilentlyContinue
          New-Item -ItemType Directory -Force dist | Out-Null
          Compress-Archive publish/* "dist/QuadStickConfigManager-${{ matrix.label }}.zip"

      - name: Package (macOS)
        if: matrix.kind == 'macos'
        shell: bash
        run: |
          mkdir -p dist
          scripts/make-macos-app.sh publish "$VERSION" "QuadStick Config Manager.app"
          # ditto is the Mac-correct zip: keeps the bundle bit, symlinks and the
          # executable permission a plain `zip` would flatten.
          ditto -c -k --keepParent "QuadStick Config Manager.app" \
            "dist/QuadStickConfigManager-${{ matrix.label }}.zip"

      - name: Package (Linux)
        if: matrix.kind == 'linux'
        shell: bash
        run: |
          mkdir -p dist
          rm -f publish/*.pdb
          tar -C publish -czf "dist/QuadStickConfigManager-${{ matrix.label }}.tar.gz" .

      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.label }}
          path: dist/*
          if-no-files-found: error

  release:
    name: Release
    needs: package
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: write   # create the release and upload the downloads
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true
      - uses: softprops/action-gh-release@v2
        with:
          name: QuadStick Config Manager ${{ github.ref_name }}
          files: dist/*
          generate_release_notes: true
          fail_on_unmatched_files: true
          prerelease: ${{ contains(github.ref_name, '-') }}
          body: |
            Download the file for your computer, unzip, and run. No installer, works offline (except Sheets import).

            | File | Computer |
            |------|----------|
            | `QuadStickConfigManager-Windows-x64.zip` | Windows 10/11, 64-bit |
            | `QuadStickConfigManager-macOS-AppleSilicon.zip` | Mac with Apple Silicon (M1/M2/M3/M4) |
            | `QuadStickConfigManager-macOS-Intel.zip` | Intel Mac |
            | `QuadStickConfigManager-Linux-x64.tar.gz` | Linux, 64-bit |

            **Windows:** SmartScreen may warn on first launch (the app isn't code-signed) — click **More info -> Run anyway**.

            **macOS:** the app isn't notarized yet, so the first launch needs **right-click the app -> Open -> Open**. If macOS says it "is damaged", run this in Terminal, then open it:
            ```
            xattr -dr com.apple.quarantine "/Applications/QuadStick Config Manager.app"
            ```
